set -gq allow-passthrough on
set -g visual-activity off
set -g mouse on

set-option -g allow-rename on
set-option -g automatic-rename off

unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

bind j previous-window
bind k next-window

# Top bar
set -g status-position top

# Start window numbering at 1
set -g base-index 1
set -g pane-base-index 1

# No left/right status — just tabs
set -g status-right ""
set -g status-left ""
set -g status-justify left

# Bar background: color0 (darkest)
set -g status-style "bg=#1d2021,fg=#7c6f64"

# Inactive tabs — muted, same dark bg
set -g window-status-format " #I #W "
set -g window-status-style "bg=#1d2021,fg=#7c6f64"

# Active tab — warm highlight using color3 (tan/gold) with dark text
set -g window-status-current-format " #I #W "
set -g window-status-current-style "bg=#ddc7a1,fg=#1d2021,bold"

set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#ddc7a1"

# Messages
set -g message-style "fg=#1d2021,bg=#ddc7a1"
