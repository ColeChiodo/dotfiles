monitor=eDP-1,1920x1080@120, auto, 1
monitor=HDMI-A-1,preferred, auto, 1, mirror, eDP-1

$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun

exec-once = waybar
exec-once = fcitx5 -d
exec-once = blueman-applet
exec-once = /usr/bin/linux-wallpaperengine --silent --no-fullscreen-pause --screen-root eDP-1 3582809467
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/.config/hypr/scripts/startup.sh
exec-once = swaync

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
cursor {
    no_hardware_cursors = true
}
env = XDG_CURRENT_DESKTOP,Hyprland

animations {
    enabled = false
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 2
    col.active_border = rgb(434a4c)
    col.inactive_border = rgb(1d2021)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

input {
    kb_layout = us, jp
    kb_options = caps:escape_shifted_capslock
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, R, exec, kitty --title float-term -e wiremix
bind = $mainMod CTRL SHIFT ALT, W, exec, pkill waybar || waybar
bind = $mainMod, F, fullscreen,
bind = $mainMod SHIFT, S, exec, hyprshot -m region --clipboard-only
bind = $mainMod CTRL SHIFT ALT, M, exec, hyprctl dispatch exit
bind = $mainMod, N, exec, ~/.config/hypr/scripts/mute-active-window.sh
bind = $mainMod CTRL SHIFT ALT, P, exec, ~/.config/hypr/scripts/mojira-capture

bind = $mainMod CTRL, H, movefocus, l
bind = $mainMod CTRL, L, movefocus, r
bind = $mainMod CTRL, K, movefocus, u
bind = $mainMod CTRL, J, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, A, togglespecialworkspace, magic
bind = $mainMod SHIFT, A, movetoworkspace, special:magic

bind = $mainMod CTRL, right, workspace, e+1
bind = $mainMod CTRL, left, workspace, e-1
bind = $mainMod, K, workspace, e+1
bind = $mainMod, J, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod ALT, SPACE, exec, hyprctl switchxkblayout keychron-keychron-k2 next

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

windowrule = match:class kitty, match:title float-term, float on
windowrule = size monitor_w*0.85 monitor_h*0.85, center on, match:class kitty, match:title float-term


